---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # only accept releases that have been out for at least 15 days
    cooldown:
      default-days: 15
    # group updates in a single PR
    groups:
      ci-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "[ci]"
    labels:
      - maintenance
